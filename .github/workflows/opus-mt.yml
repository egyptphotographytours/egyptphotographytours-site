name: OPUS-MT Smart Translation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    # Keep it just under the 6h hard limit
    timeout-minutes: 350 
    strategy:
      fail-fast: false
      # ✅ FIX 1: Run 5 languages at the same time! 
      # This cuts the 6-hour time down to ~1.5 hours and prevents timeouts.
      max-parallel: 5 
      matrix:
        lang: [es, fr, de, it, pt, ru, ja, zh-CN, ko, ar, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: opus-mt-${{ matrix.lang }}-${{ runner.os }}
          restore-keys: |
            opus-mt-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # ✅ Added 'sacremoses' to fix the tokenization warning in the logs
          pip install beautifulsoup4 transformers torch sentencepiece sacremoses

      - name: Run OPUS-MT translation
        env:
          TARGET_LANG: ${{ matrix.lang }}
          # ✅ FIX 2: Save progress every 20 files instead of 150. 
          # If it crashes, you only lose 19 files instead of 149!
          MIN_PAGES_THRESHOLD: 20 
          # ✅ SECURE: Pulls the token from GitHub Secrets instead of hardcoding it
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python translate.py
