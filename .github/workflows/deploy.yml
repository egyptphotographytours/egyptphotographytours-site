```yaml
name: Auto-Translate & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  translate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Translation Script
        run: node translate.js

      - name: Commit Translated Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🌐 Auto-translated pages [skip ci]"
            git push
          fi

  deploy:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    needs: translate
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Public Folder
        run: |
          mkdir -p public

          cp -r *.html public/ 2>/dev/null || true
          cp -r css js images public/ 2>/dev/null || true

          cp -r ar fr es de it zh ko pt ru ja nl hi sv no da fi th ms tl id public/ 2>/dev/null || true

          cp site.webmanifest browserconfig.xml public/ 2>/dev/null || true

          rm -rf public/node_modules
          rm -rf public/.github
          rm -f public/package.json
          rm -f public/package-lock.json
          rm -f public/translate.js

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
```

