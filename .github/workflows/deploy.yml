name: Auto-Translate & Deploy to GitHub Pages

on:
  push: { branches: [ main ] }
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2, token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - run: npm install

      - name: Detect Changed HTML Files
        id: changes
        run: |
          if git log --oneline -1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- "*.html" 2>/dev/null | grep -v '^ar/\|^fr/\|^es/\|^de/\|^it/\|^zh/\|^ko/\|^pt/\|^ru/\|^ja/\|^nl/\|^hi/\|^sv/\|^no/\|^da/\|^fi/\|^th/\|^ms/\|^tl/\|^id/' || echo "")
          else
            CHANGED=""
          fi
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Translate Pages
        run: |
          if [ -z "${{ steps.changes.outputs.files }}" ]; then
            npm run translate
          else
            npm run translate -- ${{ steps.changes.outputs.files }}
          fi

      - name: Commit & Push Translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ar/ fr/ es/ de/ it/ zh/ ko/ pt/ ru/ ja/ nl/ hi/ sv/ no/ da/ fi/ th/ ms/ tl/ id/
          git diff --quiet && git diff --staged --quiet || git commit -m "🌐 Auto-translate updated pages"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: translate
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: ${{ steps.deployment.outputs.page_url }} }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Prepare Clean Artifact
        run: |
          rm -rf node_modules .git .github package*.json translate.js generate-image-sitemap.js
          mkdir -p dist
          cp -r *.html css/ js/ images/ site.webmanifest dist/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./dist }
      - uses: actions/deploy-pages@v4
