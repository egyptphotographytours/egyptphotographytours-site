name: Auto-Translate & Deploy to GitHub Pages

on:
  push: { branches: [ main ] }
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - run: npm install

      - name: Translate Pages
        run: node translate.js
        continue-on-error: true  # Don't fail workflow if translation has issues

      - name: Commit Translated Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ar/ fr/ es/ de/ it/ zh/ ko/ pt/ ru/ ja/ nl/ hi/ sv/ no/ da/ fi/ th/ ms/ tl/ id/ 2>/dev/null || true
          # Only commit if there are actual changes
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🌐 Auto-translate updated pages"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "✅ No translation changes to commit"
          fi

  deploy:
    needs: translate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Clean Artifact
        run: |
          mkdir -p public
          # Copy root HTML files
          cp -r *.html public/ 2>/dev/null || true
          # Copy asset folders
          cp -r css/ js/ images/ public/ 2>/dev/null || true
          # Copy config files
          cp site.webmanifest browserconfig.xml public/ 2>/dev/null || true
          # Copy translated language folders
          cp -r ar/ fr/ es/ de/ it/ zh/ ko/ pt/ ru/ ja/ nl/ hi/ sv/ no/ da/ fi/ th/ ms/ tl/ id/ public/ 2>/dev/null || true
          # Remove automation files from deploy artifact
          rm -rf public/package*.json public/translate.js public/.github public/node_modules 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with: { path: ./public }

      - uses: actions/deploy-pages@v4
        id: deployment
