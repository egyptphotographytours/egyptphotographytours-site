name: Auto-Translate & Deploy to GitHub Pages

on:
  push: { branches: [ main ] }
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  translate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - run: npm install

      - name: Translate Pages
        run: node translate.js
        continue-on-error: true

      - name: Commit Translated Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ar/ fr/ es/ de/ it/ zh/ ko/ pt/ ru/ ja/ nl/ hi/ sv/ no/ da/ fi/ th/ ms/ tl/ id/
          git diff --quiet && git diff --staged --quiet || git commit -m "🌐 Auto-translate updated pages"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || echo "No changes to push"

      - name: Prepare Clean Artifact
        run: |
          mkdir -p deploy-dist
          cp -r *.html css/ js/ images/ site.webmanifest browserconfig.xml deploy-dist/ 2>/dev/null || true
          cp -r ar/ fr/ es/ de/ it/ zh/ ko/ pt/ ru/ ja/ nl/ hi/ sv/ no/ da/ fi/ th/ ms/ tl/ id/ deploy-dist/ 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: ./deploy-dist }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
