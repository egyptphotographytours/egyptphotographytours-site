name: Generate Image Sitemap

on:
  push:
    paths:
      - 'images/**'
      - '*.html'
      - 'generate-image-sitemap.js'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm init -y
          npm install glob

      - name: Generate image-sitemap.xml
        run: node generate-image-sitemap.js

      - name: Verify sitemap was created
        run: |
          if [ -f image-sitemap.xml ]; then
            echo "✅ image-sitemap.xml generated successfully"
            wc -l image-sitemap.xml
          else
            echo "❌ image-sitemap.xml was not created"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add image-sitemap.xml
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-generate image-sitemap.xml [skip ci]"
            git push
            echo "✅ image-sitemap.xml committed and pushed"
          else
            echo "ℹ️ No changes to commit"
          fi
