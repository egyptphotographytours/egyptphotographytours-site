name: LibreTranslate Smart Translation (Final)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    # Force Node.js 24 to eliminate deprecation warning (optional but safe)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        lang: [es, fr, de, it, pt, ru, ja, zh-CN, ko, ar, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Start LibreTranslate server
        run: |
          docker run -d --name libretranslate \
            -p 5000:5000 \
            --memory="4g" \
            libretranslate/libretranslate:latest

          echo "⏳ Waiting up to 5 minutes for LibreTranslate to be ready..."
          for i in {1..60}; do
            if curl -s -f http://localhost:5000/languages >/dev/null 2>&1; then
              echo "✅ Server ready after $((i*5)) seconds"
              exit 0
            fi
            sleep 5
          done

          echo "❌ Server failed to start. Docker logs:"
          docker logs libretranslate
          exit 1

      - name: Run translation (with batch commits)
        env:
          TARGET_LANG: ${{ matrix.lang }}
        run: python translate_libre.py
