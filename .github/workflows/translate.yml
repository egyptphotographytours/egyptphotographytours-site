name: LibreTranslate Translation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        lang: [es, fr, de, it, pt, ru, ja, zh-CN, ko, ar, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Start LibreTranslate server
        run: |
          docker run -d --name libretranslate \
            -p 5000:5000 \
            libretranslate/libretranslate:latest

      - name: Run translation
        env:
          TARGET_LANG: ${{ matrix.lang }}
        run: python translate_libre.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "./${{ matrix.lang }}" ] && [ -n "$(ls -A ./${{ matrix.lang }})" ]; then
            git add "./${{ matrix.lang }}/"
            git commit -m "translate(${{ matrix.lang }}): update" || echo "No changes"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Retry $i..."
              git pull --rebase
              sleep 5
            done
          else
            echo "No files for ${{ matrix.lang }}"
          fi
