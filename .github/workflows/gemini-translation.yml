name: Google Gemini Premium Translation

on:
  # Run manually from the GitHub Actions tab to control API quota
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    strategy:
      fail-fast: false
      # ✅ ONE BY ONE: Prevents API rate limits and focuses server power
      max-parallel: 1 
      matrix:
        # ✅ ARABIC FIRST, followed by the rest
        lang: [ar, es, fr, de, it, pt, ru, ja, zh-CN, ko, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade beautifulsoup4 google-generativeai

      - name: Run Google Gemini translation
        env:
          TARGET_LANG: ${{ matrix.lang }}
          # ✅ DEPLOY AFTER 20 PAGES
          MIN_PAGES_THRESHOLD: 20 
          # Pulls your free API key securely from GitHub Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python translate_gemini.py
