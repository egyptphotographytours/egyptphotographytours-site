name: Auto Generate Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4

      # Step 2: Generate sitemap with lastmod
      - name: Generate sitemap with lastmod
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Find all HTML files, including language subfolders
          for file in $(find . -name "*.html"); do
            page=$(echo $file | sed 's|^\./||')

            # Skip unwanted files
            if [[ "$page" != "404.html" ]]; then
              # Get last commit date for this file
              lastmod=$(git log -1 --format=%cd --date=short -- "$file")
              # Build URL with www
              url="https://www.egyptphotographytours.com/$page"
              echo "<url><loc>$url</loc><lastmod>$lastmod</lastmod></url>" >> sitemap.xml
            fi
          done

          echo '</urlset>' >> sitemap.xml

      # Step 3: Commit sitemap
      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Auto update sitemap with lastmod" || echo "No changes"
          git push
