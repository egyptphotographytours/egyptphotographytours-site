name: Auto Generate Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          for file in $(find . -name "*.html"); do
            page=$(echo $file | sed 's|^\./||')

            if [[ "$page" != "404.html" ]]; then
              lastmod=$(git log -1 --format=%cd --date=iso-strict -- "$file" | cut -d'T' -f1)
              url="https://www.egyptphotographytours.com/$page"
              echo "<url><loc>$url</loc><lastmod>$lastmod</lastmod></url>" >> sitemap.xml
            fi
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Regenerate sitemap with valid ISO dates" || echo "No changes"
          git push
