name: Auto Generate Sitemap

on:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - '!sitemap.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sitemap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate sitemap
        shell: bash
        run: |
          set -euo pipefail

          SITE="https://www.egyptphotographytours.com"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -type f -name "*.html" \
            -not -path "./node_modules/*" \
            -not -path "./.github/*" \
            -not -path '*/.*' \
            -print0 |
          sort -z |
          while IFS= read -r -d '' file; do
            page="${file#./}"

            # Skip sitemap/404 files
            if [ "$page" = "404.html" ] || [ "$page" = "sitemap.html" ]; then
              continue
            fi

            # Normalize URL
            if [ "$page" = "index.html" ]; then
              clean_url=""
            elif [[ "$page" == */index.html ]]; then
              clean_url="${page%/index.html}"
            else
              clean_url="${page%.html}"
            fi

            # Convert HTML file path to public URL
            if [ -z "$clean_url" ]; then
              loc="$SITE/"
            else
              loc="$SITE/$clean_url"
            fi

            lastmod=$(git log -1 --format=%cd --date=format:'%Y-%m-%d' -- "$page" 2>/dev/null || true)
            [ -z "${lastmod:-}" ] && lastmod=$(date +%F)

            # Set priority and changefreq based on page type
            if [[ "$page" == "contact.html" ]] || [[ "$page" == */contact.html ]]; then
              priority="0.8"
              changefreq="monthly"
            elif [[ "$page" == "tours.html" ]] || [[ "$page" == */tours.html ]]; then
              priority="0.9"
              changefreq="weekly"
            elif [[ "$page" == "blog.html" ]] || [[ "$page" == */blog.html ]]; then
              priority="0.6"
              changefreq="daily"
            else
              priority="0.5"
              changefreq="monthly"
            fi

            echo "<url><loc>${loc}</loc><lastmod>${lastmod}</lastmod><changefreq>${changefreq}</changefreq><priority>${priority}</priority></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        shell: bash
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sitemap.xml

          if ! git diff --cached --quiet; then
            git commit -m "chore: update sitemap [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
