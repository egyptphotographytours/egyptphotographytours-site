name: Smart Meta NLLB Auto-Translation

on:
  push:
    branches: [ main ] # Note: If your default branch is named 'master', change 'main' to 'master'

jobs:
  translate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # This tells GitHub to run 24 separate machines at once, one for each language
        lang: [es, fr, de, it, pt, ru, ja, zh-CN, ko, ar, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed so the script can see what files you changed

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache AI Model (Makes it fast after the first time)
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: hf-nllb-600m-${{ runner.os }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs the lightweight CPU version of PyTorch and the AI library
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers beautifulsoup4

      - name: Run Smart AI Translation Script
        env:
          TARGET_LANG: ${{ matrix.lang }}
        run: python translate_nllb.py

      - name: Commit and Push Translations
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Only commits the new language folders
          git add ./${{ matrix.lang }}/
          git commit -m "chore: auto-translate to ${{ matrix.lang }}" || echo "No changes to commit"
          git push
