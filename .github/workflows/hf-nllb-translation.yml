name: HF NLLB-200 Translation

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    strategy:
      fail-fast: false
      max-parallel: 1 
      matrix:
        lang: [ar, es, fr, de, it, pt, ru, ja, zh-CN, ko, hi, nl, sv, pl, tr, vi, th, id, cs, ro, tl, no, da, fi]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # ✅ Only needs beautifulsoup4 and requests (no huggingface_hub SDK conflicts)
          pip install beautifulsoup4 requests

      - name: Run HF NLLB-200 translation
        env:
          TARGET_LANG: ${{ matrix.lang }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} 
        run: python translate_hf_nllb.py
