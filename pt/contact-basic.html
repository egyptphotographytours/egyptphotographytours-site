<body>
<h1>Contate-nos</h1>
<form id="contactForm">
<input name="name" placeholder="Full Name" required="" type="text"/>
<input name="email" placeholder="Email Address" required="" type="email"/>
<input name="subject" placeholder="Subject" type="text"/>
<textarea name="message" placeholder="Your Message" required="" rows="5"></textarea>
<div class="cf-turnstile" data-sitekey="0x4AAAAAADksi_3_nH-4QjMP" data-theme="light"></div>
<button type="submit">Enviar mensagem</button>
<div id="form-status"></div>
</form>
<script>
        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('form-status');
        const WORKER_URL = 'https://contact-worker.hussam01112.workers.dev';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDiv.innerHTML = 'Sending...';
            statusDiv.style.color = '#666';

            const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
            if (!turnstileToken) {
                statusDiv.innerHTML = 'Please complete the security check.';
                statusDiv.style.color = '#c62828';
                return;
            }

            const formData = new FormData(form);
            const payload = {
                name: formData.get('name'),
                email: formData.get('email'),
                subject: formData.get('subject'),
                message: formData.get('message'),
                turnstileToken: turnstileToken
            };

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    statusDiv.innerHTML = '✅ Message sent successfully!';
                    statusDiv.style.color = '#2e7d32';
                    form.reset();
                    turnstile.reset();
                } else {
                    statusDiv.innerHTML = result.error || 'Something went wrong. Please try again.';
                    statusDiv.style.color = '#c62828';
                }
            } catch (err) {
                statusDiv.innerHTML = 'Network error. Please check your connection.';
                statusDiv.style.color = '#c62828';
                console.error(err);
            }
        });
    </script>
